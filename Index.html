<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Signs — Job Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;--bg4:#2a2a2a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --accent:#FF00FF;--accent-bg:rgba(255,0,255,0.12);--accent-dark:#cc00cc;
  --red:#e55;--red-bg:rgba(238,85,85,0.13);
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.13);
  --radius:10px;--radius-lg:14px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}
.scroll-body{flex:1;overflow-y:auto;padding:1rem}
.scroll-body::-webkit-scrollbar{width:4px}
.scroll-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);min-height:52px}
.topbar-logo{height:30px;width:auto;max-width:150px;object-fit:contain}
.topbar-center{display:flex;justify-content:center;width:100%}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-right{display:flex;align-items:center;gap:6px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:4px;display:flex;align-items:center;border-radius:6px;flex-shrink:0}
.back-btn:hover{color:var(--text)}
.dash-btn{background:var(--accent);border:none;border-radius:var(--radius);padding:5px 12px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.dash-btn:hover{background:var(--accent-dark)}
.tab-row{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 1rem}
.tab{flex:1;padding:.6rem 0;text-align:center;font-size:13px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;transition:color .15s}
.tab.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent)}
/* DASHBOARD */
.dash-tile-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.dash-tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s,background .15s}
.dash-tile:hover{border-color:var(--accent);background:var(--bg3)}
.dash-tile-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.dash-tile-val{font-size:30px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;color:var(--text)}
.stage-filter-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stage-filter-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s;font-family:var(--font);line-height:1.3}
.stage-filter-btn:hover{border-color:var(--border2);color:var(--text)}
.dash-stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.dash-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1rem}
.dash-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.dash-stat-val{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px}
.dash-big-btn{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text2);font-size:14px;font-family:var(--font);transition:border-color .15s,color .15s;margin-bottom:8px}
.dash-big-btn:hover{border-color:var(--border2);color:var(--text)}
.overdue-banner{background:var(--red-bg);border:1px solid rgba(238,85,85,.25);border-radius:var(--radius);padding:.7rem 1rem;margin-bottom:10px;font-size:13px;color:var(--red);display:flex;align-items:center;gap:8px}
.pipeline-banner{background:var(--accent-bg);border:1px solid rgba(255,0,255,.2);border-radius:var(--radius);padding:.65rem 1rem;margin-bottom:10px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:8px}
/* JOB LIST */
.list-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px 8px 32px;color:var(--text);font-family:var(--font);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.filter-select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0 8px;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);height:36px;outline:none}
.sort-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;color:var(--text2);font-size:16px;cursor:pointer;height:36px;display:flex;align-items:center;font-family:var(--font)}
.sort-btn:hover{color:var(--text)}
.job-list{display:flex;flex-direction:column;gap:8px}
.job-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1rem;cursor:pointer;transition:border-color .15s,background .15s}
.job-card:hover{border-color:var(--border2);background:var(--bg3)}
.job-card.overdue{border-color:rgba(238,85,85,.35)}
.job-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:5px}
.client-avatar{width:36px;height:36px;border-radius:8px;object-fit:contain;border:1px solid var(--border);flex-shrink:0;background:var(--bg3)}
.client-initials{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.job-card-info{flex:1;min-width:0}
.job-num{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:1px}
.job-card-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.job-card-meta{font-size:12px;color:var(--text3)}
.job-card-badges{display:flex;align-items:flex-start;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:110px}
.badge{font-size:11px;padding:3px 7px;border-radius:99px;white-space:nowrap;font-weight:600}
.badge-urgent{background:var(--red-bg);color:var(--red)}
.job-snippet{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:5px}
/* FAB */
.fab{position:absolute;bottom:1.5rem;right:1.5rem;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 4px 20px rgba(255,0,255,.4);transition:transform .15s;z-index:10}
.fab:hover{transform:scale(1.07)}
.screen-relative{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
/* DETAIL */
.detail-hero{display:flex;align-items:center;gap:14px;padding:1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-avatar{width:52px;height:52px;border-radius:10px;object-fit:contain;border:1px solid var(--border);background:var(--bg3)}
.detail-avatar-init{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.detail-hero-info{flex:1;min-width:0}
.detail-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.detail-client-name{font-size:13px;color:var(--text2)}
.section{padding:1rem;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:.75rem;font-weight:600}
.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.meta-item{background:var(--bg3);border-radius:var(--radius);padding:.65rem .85rem}
.meta-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.meta-value{font-size:13px;color:var(--text);font-weight:500}
.meta-value.red{color:var(--red)}
.desc-text{font-size:13px;color:var(--text2);line-height:1.7}
.status-row{display:flex;gap:6px;flex-wrap:wrap}
.status-chip{padding:5px 11px;border-radius:99px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--text3);background:transparent;font-family:var(--font);transition:all .15s}
/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer}
.photo-add{width:100%;aspect-ratio:1;border-radius:8px;border:1px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);background:var(--bg3);font-size:11px;gap:4px;transition:border-color .15s,color .15s}
.photo-add:hover{border-color:var(--accent);color:var(--accent)}
/* NOTES */
.note-item{display:flex;gap:10px;margin-bottom:.75rem}
.note-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.note-text{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:2px}
.note-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
.note-input-row{display:flex;gap:8px;margin-top:.75rem}
.note-input-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none}
.note-input-row input:focus{border-color:var(--border2)}
.note-input-row button{background:var(--accent);border:none;border-radius:var(--radius);padding:7px 14px;color:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer}
/* FORMS */
.form-body{padding:1rem;display:flex;flex-direction:column;gap:.85rem}
.form-group label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=date],input[type=number],input[type=tel],input[type=email],textarea,select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--border2)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:80px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-primary{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius-lg);color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-secondary{width:100%;padding:10px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-lg);color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;margin-bottom:6px}
.btn-danger{width:100%;padding:10px;background:transparent;border:1px solid rgba(238,85,85,.3);border-radius:var(--radius-lg);color:var(--red);font-family:var(--font);font-size:13px;cursor:pointer}
.btn-danger:hover{background:var(--red-bg)}
.btn-success{width:100%;padding:10px;background:var(--green-bg);border:1px solid rgba(76,175,125,.3);border-radius:var(--radius-lg);color:var(--green);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px}
.checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.checkbox-row span{font-size:13px;color:var(--text2)}
.upload-zone{border:1px dashed var(--border2);border-radius:var(--radius);padding:1rem;text-align:center;cursor:pointer;color:var(--text3);font-size:12px;background:var(--bg2);transition:border-color .15s,color .15s}
.upload-zone:hover{border-color:var(--accent);color:var(--accent)}
.logo-preview{width:60px;height:60px;object-fit:contain;border-radius:8px;border:1px solid var(--border);display:block;margin:8px auto 0}
/* LIGHTBOX */
.lightbox-bg{background:rgba(0,0,0,.8);border-radius:var(--radius-lg);padding:1rem;text-align:center;margin-bottom:1rem}
.lightbox-img{max-width:100%;max-height:55vh;border-radius:var(--radius);object-fit:contain}
/* CLIENTS */
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s;margin-bottom:8px}
.client-card:hover{border-color:var(--border2)}
.client-card-name{font-size:14px;font-weight:600;color:var(--text)}
.client-card-meta{font-size:12px;color:var(--text3);margin-top:2px}
.client-detail-jobs{display:flex;flex-direction:column;gap:6px}
.client-job-row{background:var(--bg3);border-radius:var(--radius);padding:.7rem .85rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.client-job-row:hover{background:var(--bg4)}
/* SETTINGS */
.settings-group{border-bottom:1px solid var(--border);padding:1rem}
.settings-group-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.85rem;font-weight:600}
.pdf-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem 1rem;cursor:pointer;color:var(--text2);font-size:13px;width:100%;font-family:var(--font);transition:border-color .15s;margin-bottom:8px}
.pdf-btn:hover{border-color:var(--border2);color:var(--text)}
/* BIN */
.bin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1rem;margin-bottom:8px}
.bin-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.bin-card-meta{font-size:12px;color:var(--text3);margin-bottom:6px}
.bin-countdown{font-size:12px;color:var(--red);font-family:var(--mono);margin-bottom:8px}
.bin-actions{display:flex;gap:8px}
.bin-restore-btn{flex:1;padding:7px;background:var(--green-bg);border:1px solid rgba(76,175,125,.3);border-radius:var(--radius);color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.bin-delete-btn{flex:1;padding:7px;background:var(--red-bg);border:1px solid rgba(238,85,85,.3);border-radius:var(--radius);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:16px;font-weight:700;color:var(--text)}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:4px;font-family:var(--font)}
.cal-nav:hover{color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-day-label{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:600}
.cal-day{min-height:42px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px;cursor:pointer;transition:border-color .15s}
.cal-day:hover{border-color:var(--border2)}
.cal-day.today{border-color:var(--accent)}
.cal-day.other-month{background:var(--bg);opacity:.35}
.cal-day-num{font-size:12px;color:var(--text2);line-height:1}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:700}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-jobs-list{display:flex;flex-direction:column;gap:6px}
.cal-job-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.cal-job-item:hover{border-color:var(--border2)}
/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px;line-height:1.7}
.empty-icon{font-size:36px;margin-bottom:.5rem;display:block}
/* BOTTOM NAV */
.bottom-nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.nav-btn{flex:1;padding:.6rem;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;color:var(--text3);font-family:var(--font);font-size:10px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn-icon{font-size:18px;line-height:1}
@media(min-width:600px){body{max-width:500px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>

  <div class="scroll-body">
    <div class="form-body">
      <div class="form-group"><label>Job title</label><input type="text" id="f-title" placeholder="e.g. Vehicle wrap" oninput="autoSaveForm()"></div>
      <div class="row2">
        <div class="form-group"><label>Client name</label><input type="text" id="f-client" placeholder="Business name" oninput="autoSaveForm()"></div>
        <div class="form-group"><label>Stage</label>
          <select id="f-stage" onchange="autoSaveForm()">
            <option value="survey">Survey</option><option value="quote">Quote</option>
            <option value="design">Design</option><option value="approval">Out for Approval</option>
            <option value="production">Production</option><option value="install">Install</option>
            <option value="invoiced">Invoiced</option><option value="completed">Completed / Paid</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Client contact name</label><input type="text" id="f-contact" placeholder="e.g. Sarah Johnson" oninput="autoSaveForm()"></div>
      <div class="row2">
        <div class="form-group"><label>Phone</label><input type="tel" id="f-phone" placeholder="021 000 0000" oninput="autoSaveForm()"></div>
        <div class="form-group"><label>Email</label><input type="email" id="f-email" placeholder="client@email.com" oninput="autoSaveForm()"></div>
      </div>
      <div class="form-group"><label>Client logo (optional)</label>
        <div class="upload-zone" onclick="document.getElementById('f-logo-inp').click()">&#128444; Tap to upload client logo</div>
        <input type="file" id="f-logo-inp" accept="image/*" style="display:none" onchange="previewImg(event,'f-logo-prev')">
        <img id="f-logo-prev" class="logo-preview" style="display:none">
      </div>
      <div class="row2">
        <div class="form-group"><label>Due date</label><input type="date" id="f-due" onchange="autoSaveForm()"></div>
        <div class="form-group"><label>Quote value ($)</label><input type="number" id="f-value" placeholder="0.00" min="0" oninput="autoSaveForm()"></div>
      </div>
      <div class="row2">
        <div class="form-group"><label>Materials / supplier</label><input type="text" id="f-supplier" placeholder="e.g. Avery 1005" oninput="autoSaveForm()"></div>
        <div class="form-group"><label>Priority</label>
          <select id="f-priority" onchange="autoSaveForm()"><option value="normal">Normal</option><option value="urgent">Urgent</option></select>
        </div>
      </div>
      <div class="form-group"><label>Description / brief</label><textarea id="f-desc" placeholder="What does the client want? Sizes, colours, materials..." oninput="autoSaveForm()"></textarea></div>
      <div class="form-group"><label class="checkbox-row"><input type="checkbox" id="f-proof" onchange="autoSaveForm()"><span>Design proof approved by client</span></label></div>
      <input type="hidden" id="f-edit-id">
      <button class="btn-primary" onclick="saveJob(false)">Save job</button>
    </div>
  </div>
</div>

<script>
const STAGES={
  survey:{label:'Survey',color:'#5b9cf6'},
  quote:{label:'Quote',color:'#f5a623'},
  design:{label:'Design',color:'#b06fe3'},
  approval:{label:'Out for Approval',color:'#f0d040'},
  production:{label:'Production',color:'#4caf7d'},
  install:{label:'Install',color:'#888'},
  invoiced:{label:'Invoiced',color:'#26c6da'},
  completed:{label:'Completed/Paid',color:'#2e7d32'},
  cancelled:{label:'Cancelled',color:'#e55'}
};
const AVATAR_COLORS=[
  {bg:'#1b5e20',fg:'#fff'},{bg:'#b71c1c',fg:'#fff'},{bg:'#0d47a1',fg:'#fff'},
  {bg:'#f9a825',fg:'#000'},{bg:'#cfd8dc',fg:'#000'},{bg:'#4a148c',fg:'#fff'},
  {bg:'#e65100',fg:'#fff'},{bg:'#00695c',fg:'#fff'},{bg:'#283593',fg:'#fff'},{bg:'#880e4f',fg:'#fff'}
];
let state={
  jobs:[
    {id:1,jobNum:'JOB-001',title:'Vehicle wrap — Toyota Hilux',client:'Kiwi Plumbing Ltd',contact:'Mike Harris',phone:'021 555 0101',email:'mike@kiwiplumbing.co.nz',stage:'production',due:'2026-06-20',created:'2026-06-01',updated:'2026-06-05',value:1800,priority:'urgent',desc:'Full wrap white 2022 Hilux. Blue/orange branding, matte finish.',proof:false,supplier:'Avery 1005 matte',logo:null,photos:[],notes:[{text:'Logo file confirmed hi-res.',date:'2026-06-03'}],archived:false,deleted:false},
    {id:2,jobNum:'JOB-002',title:'Shop fascia sign',client:'Porirua Bakehouse',contact:'Emma Liu',phone:'04 555 0222',email:'emma@porirua-bake.co.nz',stage:'approval',due:'2026-06-15',created:'2026-06-02',updated:'2026-06-04',value:950,priority:'normal',desc:'Illuminated ACM fascia 4m x 600mm. Cream/dark brown.',proof:true,supplier:'ACM Metalex',logo:null,photos:[],notes:[],archived:false,deleted:false},
    {id:3,jobNum:'JOB-003',title:'Real estate boards x 20',client:'Ray White Porirua',contact:'James Tane',phone:'04 555 0333',email:'james@raywhite.co.nz',stage:'completed',due:'2026-06-10',created:'2026-05-28',updated:'2026-06-09',value:640,priority:'normal',desc:'20x corflute 900x600mm double sided.',proof:true,supplier:'4mm corflute PaperlinX',logo:null,photos:[],notes:[{text:'Delivered signed off.',date:'2026-06-09'}],archived:true,deleted:false}
  ],
  bizName:'Pixel Signs',nextId:4,nextJobNum:4
};
let currentJobId=null,compTab='completed';
let lightboxJobId=null,lightboxPhotoIdx=null;
let backStack=[];
let activeFilter={text:'',stage:'all',sort:'due'};
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let autoSaveTimer=null;

function load(){try{const d=localStorage.getItem('ps_v3');if(d)state=JSON.parse(d);}catch(e){}}
// save() is defined below in the Firebase section — uses cloud sync + localStorage fallback
load();

function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function isOverdue(j){if(!j.due||j.archived||j.deleted)return false;return new Date(j.due)<new Date(new Date().toDateString());}
function fmtMoney(v){if(!v&&v!==0)return'—';return'$'+Number(v).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayStr(){return new Date().toISOString().slice(0,10);}
function clientColor(name){let h=0;for(let c of(name||'?'))h=(h<<5)-h+c.charCodeAt(0);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function stageBadge(stage){const s=STAGES[stage]||STAGES.survey;return '<span class="badge" style="background:'+s.color+'22;color:'+s.color+';border:1px solid '+s.color+'44">'+s.label+'</span>';}
function avatarEl(job,size){
  size=size||36;
  if(job&&job.logo){const img=document.createElement('img');img.src=job.logo;img.className='client-avatar';img.style.width=img.style.height=size+'px';img.alt='';return img;}
  const col=clientColor(job?job.client:'?');
  const d=document.createElement('div');d.className='client-initials';
  d.style.cssText='width:'+size+'px;height:'+size+'px;font-size:'+(size<=36?13:17)+'px;background:'+col.bg+';color:'+col.fg;
  d.textContent=initials(job?job.client:'?');return d;
}

function showScreen(id,addToStack){
  if(addToStack===undefined)addToStack=true;
  if(addToStack){const cur=document.querySelector('.screen.active');if(cur)backStack.push(cur.id);}
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const navS=['screen-dash','screen-active','screen-clients','screen-calendar','screen-settings'];
  document.getElementById('bottom-nav').style.display=navS.includes(id)?'flex':'none';
  ['dash','active','clients','calendar','settings'].forEach(n=>{const el=document.getElementById('nav-'+n);if(el)el.classList.remove('active');});
  const m={'screen-dash':'dash','screen-active':'active','screen-clients':'clients','screen-calendar':'calendar','screen-settings':'settings'};
  if(m[id]){const el=document.getElementById('nav-'+m[id]);if(el)el.classList.add('active');}
}
function goBack(){
  const prev=backStack.pop();
  if(prev){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    const navS=['screen-dash','screen-active','screen-clients','screen-calendar','screen-settings'];
    document.getElementById('bottom-nav').style.display=navS.includes(prev)?'flex':'none';
  }else showNav('dash');
}
function showNav(tab){
  backStack=[];
  if(tab==='dash'){renderDashboard();showScreen('screen-dash',false);}
  else if(tab==='clients'){renderClients();showScreen('screen-clients',false);}
  else if(tab==='settings'){loadSettings();showScreen('screen-settings',false);}
  else if(tab==='active'){showActiveJobs();}
}

// DASHBOARD
function renderDashboard(){
  const body=document.getElementById('dash-body');
  const active=state.jobs.filter(j=>!j.archived&&!j.deleted&&j.stage!=='completed'&&j.stage!=='cancelled');
  const done=state.jobs.filter(j=>(j.archived||j.stage==='completed'||j.stage==='cancelled')&&!j.deleted);
  const pipeline=active.reduce((a,j)=>a+(Number(j.value)||0),0);
  const earned=state.jobs.filter(j=>j.stage==='completed'&&!j.deleted).reduce((a,j)=>a+(Number(j.value)||0),0);
  const overdue=active.filter(j=>isOverdue(j));
  const unpaid=state.jobs.filter(j=>j.stage==='invoiced'&&!j.deleted).reduce((a,j)=>a+(Number(j.value)||0),0);
  let h='';
  if(overdue.length)h+='<div class="overdue-banner">&#9888; '+overdue.length+' overdue job'+(overdue.length>1?'s':'')+'</div>';
  if(unpaid)h+='<div class="pipeline-banner">&#128181; '+fmtMoney(unpaid)+' awaiting payment</div>';
  h+='<div class="dash-tile-row"><div class="dash-tile" onclick="showActiveJobs()"><div class="dash-tile-label">Active Jobs</div><div class="dash-tile-val">'+active.length+'</div></div><div class="dash-tile" onclick="showCompleted()"><div class="dash-tile-label">Completed</div><div class="dash-tile-val">'+done.length+'</div></div></div>';
  h+='<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-weight:600">Filter by stage</div>';
  h+='<div class="stage-filter-row">';
  ['survey','quote','design','production'].forEach(s=>{
    const st=STAGES[s];const cnt=active.filter(j=>j.stage===s).length;
    h+='<button class="stage-filter-btn" style="border-color:'+st.color+'55;color:'+st.color+'" onclick="showActiveJobs(\''+s+'\')"><div style="font-size:11px">'+st.label+'</div><div style="font-size:20px;font-weight:700;font-family:var(--mono);margin-top:2px">'+cnt+'</div></button>';
  });
  h+='</div>';
  h+='<div class="dash-stats-row"><div class="dash-stat"><div class="dash-stat-label">Pipeline</div><div class="dash-stat-val" style="color:var(--accent)">'+fmtMoney(pipeline)+'</div></div><div class="dash-stat"><div class="dash-stat-label">Total Earned</div><div class="dash-stat-val" style="color:var(--green)">'+fmtMoney(earned)+'</div></div></div>';
  h+='<button class="dash-big-btn" onclick="showNewJob()" style="border-color:rgba(255,0,255,.3);color:var(--accent)"><span style="font-size:22px">&#43;</span><span style="font-weight:600">New job</span></button>';
  h+='<button class="dash-big-btn" onclick="showCompleted()"><span style="font-size:22px">&#10003;</span><span>Completed &amp; Cancelled jobs</span></button>';
  h+='<button class="dash-big-btn" onclick="showCalendar()"><span style="font-size:22px">&#128197;</span><span>Calendar — Job due dates</span></button>';
  body.innerHTML=h;
}

// ACTIVE JOBS
function showActiveJobs(stageFilter){
  if(stageFilter)activeFilter.stage=stageFilter;
  renderActiveJobs();showScreen('screen-active');
}
function renderActiveJobs(){
  const body=document.getElementById('active-body');
  let list=state.jobs.filter(j=>!j.archived&&!j.deleted&&j.stage!=='completed'&&j.stage!=='cancelled');
  if(activeFilter.stage&&activeFilter.stage!=='all')list=list.filter(j=>j.stage===activeFilter.stage);
  if(activeFilter.text){const q=activeFilter.text.toLowerCase();list=list.filter(j=>(j.title+j.client+(j.jobNum||'')).toLowerCase().includes(q));}
  if(activeFilter.sort==='due')list=[...list].sort((a,b)=>(a.due||'9999')>(b.due||'9999')?1:-1);
  else if(activeFilter.sort==='newest')list=[...list].sort((a,b)=>b.id-a.id);
  else if(activeFilter.sort==='oldest')list=[...list].sort((a,b)=>a.id-b.id);
  else if(activeFilter.sort==='updated')list=[...list].sort((a,b)=>(b.updated||b.created)>(a.updated||a.created)?1:-1);
  const overdue=list.filter(j=>isOverdue(j));
  let h='';
  if(overdue.length)h+='<div class="overdue-banner" style="margin-bottom:10px">&#9888; '+overdue.length+' overdue</div>';
  h+='<div class="list-header"><div class="search-wrap"><span class="search-icon">&#128269;</span><input type="text" placeholder="Search..." value="'+activeFilter.text+'" oninput="activeFilter.text=this.value;renderActiveJobs()"></div><select class="filter-select" onchange="activeFilter.stage=this.value;renderActiveJobs()"><option value="all" '+(activeFilter.stage==='all'?'selected':'')+'>All</option>'+Object.entries(STAGES).filter(([k])=>!['completed','cancelled'].includes(k)).map(([k,v])=>'<option value="'+k+'" '+(activeFilter.stage===k?'selected':'')+'>'+v.label+'</option>').join('')+'</select><button class="sort-btn" onclick="cycleSortActive()" title="Sort">'+(activeFilter.sort==='due'?'📅':activeFilter.sort==='newest'?'⬇':'⬆')+'</button></div>';
  body.innerHTML=h;
  renderJobList(body,list);
}
function cycleSortActive(){const o=['due','newest','oldest','updated'];activeFilter.sort=o[(o.indexOf(activeFilter.sort)+1)%o.length];renderActiveJobs();}

// JOB LIST
function renderJobList(container,list){
  if(!list.length){const e=document.createElement('div');e.className='empty';e.innerHTML='<span class="empty-icon">&#128221;</span>No jobs here.';container.appendChild(e);return;}
  const ul=document.createElement('div');ul.className='job-list';
  list.forEach(j=>{
    const od=isOverdue(j);
    const card=document.createElement('div');card.className='job-card'+(od?' overdue':'');card.onclick=()=>showDetail(j.id);
    const top=document.createElement('div');top.className='job-card-top';top.appendChild(avatarEl(j));
    const info=document.createElement('div');info.className='job-card-info';
    info.innerHTML='<div class="job-num">'+(j.jobNum||'')+'</div><div class="job-card-title">'+j.title+'</div><div class="job-card-meta">'+j.client+(j.due?' &middot; Due '+fmtDate(j.due):'')+'</div>';
    top.appendChild(info);
    const badges=document.createElement('div');badges.className='job-card-badges';
    if(j.priority==='urgent')badges.innerHTML+='<span class="badge badge-urgent">Urgent</span>';
    badges.innerHTML+=stageBadge(j.stage);top.appendChild(badges);card.appendChild(top);
    if(j.desc){const sn=document.createElement('div');sn.className='job-snippet';sn.textContent=j.desc;card.appendChild(sn);}
    ul.appendChild(card);
  });
  container.appendChild(ul);
}

// COMPLETED
function showCompleted(){renderCompleted();showScreen('screen-completed');}
function switchCompTab(t){compTab=t;document.getElementById('tab-comp').classList.toggle('active',t==='completed');document.getElementById('tab-canc').classList.toggle('active',t==='cancelled');renderCompleted();}
function renderCompleted(){const body=document.getElementById('completed-body');body.innerHTML='';renderJobList(body,state.jobs.filter(j=>j.stage===compTab&&!j.deleted));}

// DETAIL
function showDetail(id){
  const j=state.jobs.find(x=>x.id===id);if(!j)return;
  currentJobId=id;
  document.getElementById('d-job-num').textContent=j.jobNum||'';
  const hero=document.getElementById('d-hero');hero.innerHTML='';
  const av=avatarEl(j,52);
  if(!j.logo){const col=clientColor(j.client);av.style.background=col.bg;av.style.color=col.fg;}
  hero.appendChild(av);
  const hi=document.createElement('div');hi.className='detail-hero-info';
  hi.innerHTML='<div class="detail-title">'+j.title+'</div><div class="detail-client-name">'+j.client+'</div><div style="margin-top:5px">'+stageBadge(j.stage)+(j.priority==='urgent'?' <span class="badge badge-urgent">Urgent</span>':'')+'</div>';
  hero.appendChild(hi);
  const body=document.getElementById('d-body');body.innerHTML='';
  const od=isOverdue(j);
  body.innerHTML='<div class="section"><div class="section-title">Job details</div><div class="meta-grid"><div class="meta-item"><div class="meta-label">Due date</div><div class="meta-value'+(od?' red':'')+'">'+fmtDate(j.due)+(od?' ⚠':'')+'</div></div><div class="meta-item"><div class="meta-label">Created</div><div class="meta-value">'+fmtDate(j.created)+'</div></div><div class="meta-item"><div class="meta-label">Quote value</div><div class="meta-value">'+fmtMoney(j.value)+'</div></div><div class="meta-item"><div class="meta-label">Materials</div><div class="meta-value" style="font-size:12px">'+(j.supplier||'—')+'</div></div></div></div>';
  if(j.contact||j.phone||j.email)body.innerHTML+='<div class="section"><div class="section-title">Contact</div><div class="meta-grid">'+(j.contact?'<div class="meta-item"><div class="meta-label">Name</div><div class="meta-value" style="font-size:12px">'+j.contact+'</div></div>':'')+(j.phone?'<div class="meta-item"><div class="meta-label">Phone</div><div class="meta-value"><a href="tel:'+j.phone+'" style="color:var(--accent);text-decoration:none">'+j.phone+'</a></div></div>':'')+(j.email?'<div class="meta-item" style="grid-column:span 2"><div class="meta-label">Email</div><div class="meta-value"><a href="mailto:'+j.email+'" style="color:var(--accent);text-decoration:none;font-size:12px">'+j.email+'</a></div></div>':'')+'</div></div>';
  body.innerHTML+='<div class="section"><div class="section-title">Brief</div><div class="desc-text">'+(j.desc||'No description.')+'</div></div>';
  body.innerHTML+='<div class="section"><div class="section-title">Stage</div><div class="status-row" id="stage-chips"></div></div>';
  body.innerHTML+='<div class="section"><div class="section-title">Checklist</div><label class="checkbox-row"><input type="checkbox" '+(j.proof?'checked':'')+' onchange="toggleField('+j.id+',\'proof\',this.checked)"><span>Design proof approved</span></label></div>';
  // Photos
  const ps=document.createElement('div');ps.className='section';ps.innerHTML='<div class="section-title">Photos</div>';
  const pg=document.createElement('div');pg.className='photo-grid';pg.id='photo-grid';renderPhotoGrid(pg,j);ps.appendChild(pg);body.appendChild(ps);
  // Notes
  const ns=document.createElement('div');ns.className='section';
  ns.innerHTML='<div class="section-title">Notes log</div><div id="notes-list"></div><div class="note-input-row"><input type="text" id="note-inp" placeholder="Add a note..."><button onclick="addNote('+j.id+')">Add</button></div>';
  body.appendChild(ns);renderNotes(j);
  // Actions
  const as=document.createElement('div');as.className='section';
  as.innerHTML='<div style="display:flex;flex-direction:column;gap:6px"><button class="pdf-btn" onclick="printJobSheet('+j.id+')">&#128229; Export job sheet</button><button class="btn-secondary" onclick="editJob('+j.id+')">&#9998; Edit job</button><button class="btn-danger" onclick="softDeleteJob('+j.id+')">&#128465; Move to Recycle Bin</button></div>';
  body.appendChild(as);
  // Stage chips
  const sc=document.getElementById('stage-chips');
  Object.entries(STAGES).forEach(([k,v])=>{
    const btn=document.createElement('button');btn.className='status-chip';
    if(j.stage===k)btn.style.cssText='border-color:'+v.color+';color:'+v.color+';background:'+v.color+'20;font-weight:600';
    else btn.style.color=v.color;
    btn.textContent=v.label;btn.onclick=()=>setStage(j.id,k);sc.appendChild(btn);
  });
  showScreen('screen-detail');
}
function setStage(id,stage){
  const j=state.jobs.find(x=>x.id===id);if(!j)return;
  j.stage=stage;j.updated=todayStr();
  j.archived=(stage==='completed'||stage==='cancelled');
  save();showDetail(id);
}
function toggleField(id,field,val){const j=state.jobs.find(x=>x.id===id);if(!j)return;j[field]=val;j.updated=todayStr();save();}

// PHOTOS
function renderPhotoGrid(pg,j){pg.innerHTML='';(j.photos||[]).forEach((p,i)=>{const img=document.createElement('img');img.src=p;img.className='photo-thumb';img.alt='';img.onclick=()=>openLightbox(j.id,i);pg.appendChild(img);});const add=document.createElement('div');add.className='photo-add';add.innerHTML='<span style="font-size:22px">&#128247;</span><span>Add photo</span>';add.onclick=()=>document.getElementById('photo-input').click();pg.appendChild(add);}
function handlePhotoAdd(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{const j=state.jobs.find(x=>x.id===currentJobId);if(!j)return;if(!j.photos)j.photos=[];j.photos.push(ev.target.result);j.updated=todayStr();save();const pg=document.getElementById('photo-grid');if(pg)renderPhotoGrid(pg,j);};reader.readAsDataURL(file);e.target.value='';}
function openLightbox(jobId,idx){const j=state.jobs.find(x=>x.id===jobId);if(!j)return;lightboxJobId=jobId;lightboxPhotoIdx=idx;document.getElementById('lb-img').src=j.photos[idx];document.getElementById('lb-caption').textContent='Photo '+(idx+1)+' of '+j.photos.length+' — '+j.title;showScreen('screen-lightbox');}
function deleteCurrentPhoto(){if(!confirm('Delete this photo?'))return;const j=state.jobs.find(x=>x.id===lightboxJobId);if(!j)return;j.photos.splice(lightboxPhotoIdx,1);save();goBack();}

// NOTES
function renderNotes(j){const nl=document.getElementById('notes-list');if(!nl)return;if(!(j.notes&&j.notes.length)){nl.innerHTML='<p style="font-size:12px;color:var(--text3);margin-bottom:.5rem">No notes yet.</p>';return;}nl.innerHTML=j.notes.slice().reverse().map(n=>'<div class="note-item"><div class="note-dot"></div><div><div class="note-text">'+n.text+'</div><div class="note-date">'+n.date+'</div></div></div>').join('');}
function addNote(id){const inp=document.getElementById('note-inp');const txt=inp.value.trim();if(!txt)return;const j=state.jobs.find(x=>x.id===id);if(!j)return;if(!j.notes)j.notes=[];j.notes.push({text:txt,date:todayStr()});inp.value='';j.updated=todayStr();save();renderNotes(j);}

// NEW/EDIT JOB
function showNewJob(){
  ['f-title','f-client','f-contact','f-phone','f-email','f-desc','f-supplier'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-due').value='';document.getElementById('f-value').value='';
  document.getElementById('f-stage').value='survey';document.getElementById('f-priority').value='normal';
  document.getElementById('f-proof').checked=false;document.getElementById('f-edit-id').value='';
  const lp=document.getElementById('f-logo-prev');lp.style.display='none';lp.dataset.data='';
  showScreen('screen-new');
}
function editJob(id){
  const j=state.jobs.find(x=>x.id===id);if(!j)return;
  document.getElementById('f-title').value=j.title||'';document.getElementById('f-client').value=j.client||'';
  document.getElementById('f-contact').value=j.contact||'';document.getElementById('f-phone').value=j.phone||'';
  document.getElementById('f-email').value=j.email||'';document.getElementById('f-due').value=j.due||'';
  document.getElementById('f-value').value=j.value||'';document.getElementById('f-stage').value=j.stage||'survey';
  document.getElementById('f-priority').value=j.priority||'normal';document.getElementById('f-desc').value=j.desc||'';
  document.getElementById('f-supplier').value=j.supplier||'';document.getElementById('f-proof').checked=j.proof||false;
  document.getElementById('f-edit-id').value=j.id;
  const lp=document.getElementById('f-logo-prev');
  if(j.logo){lp.src=j.logo;lp.style.display='block';lp.dataset.data=j.logo;}else{lp.style.display='none';lp.dataset.data='';}
  showScreen('screen-new');
}
function autoSaveForm(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{const editId=document.getElementById('f-edit-id').value;if(editId)saveJob(true);},800);
}
function saveJob(silent){
  if(silent===undefined)silent=false;
  const title=document.getElementById('f-title').value.trim();
  const client=document.getElementById('f-client').value.trim();
  if(!title||!client){if(!silent)alert('Please enter a title and client name.');return false;}
  const editId=document.getElementById('f-edit-id').value;
  const lp=document.getElementById('f-logo-prev');const logoData=lp.dataset.data||null;
  const stage=document.getElementById('f-stage').value;
  if(editId){
    const j=state.jobs.find(x=>x.id==editId);if(!j)return false;
    j.title=title;j.client=client;j.contact=document.getElementById('f-contact').value.trim();
    j.phone=document.getElementById('f-phone').value.trim();j.email=document.getElementById('f-email').value.trim();
    j.due=document.getElementById('f-due').value;j.value=parseFloat(document.getElementById('f-value').value)||0;
    j.stage=stage;j.priority=document.getElementById('f-priority').value;
    j.desc=document.getElementById('f-desc').value.trim();j.supplier=document.getElementById('f-supplier').value.trim();
    j.proof=document.getElementById('f-proof').checked;if(logoData)j.logo=logoData;
    j.updated=todayStr();j.archived=(stage==='completed'||stage==='cancelled');
    save();if(!silent)showDetail(j.id);return true;
  }
  const nj={id:state.nextId++,jobNum:'JOB-'+String(state.nextJobNum++).padStart(3,'0'),
    title,client,contact:document.getElementById('f-contact').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),
    stage,priority:document.getElementById('f-priority').value,
    due:document.getElementById('f-due').value,created:todayStr(),updated:todayStr(),
    value:parseFloat(document.getElementById('f-value').value)||0,
    desc:document.getElementById('f-desc').value.trim(),proof:document.getElementById('f-proof').checked,
    supplier:document.getElementById('f-supplier').value.trim(),logo:logoData,
    photos:[],notes:[],archived:(stage==='completed'||stage==='cancelled'),deleted:false};
  state.jobs.unshift(nj);save();if(!silent)showDetail(nj.id);return true;
}
function saveAndGoBack(){const editId=document.getElementById('f-edit-id').value;if(editId)saveJob(true);goBack();}
function saveAndGoTo(dest){saveJob(true);showNav(dest);}

// CLIENTS
function renderClients(){
  const body=document.getElementById('clients-body');
  const map={};
  state.jobs.filter(j=>!j.deleted).forEach(j=>{if(!map[j.client])map[j.client]={name:j.client,logo:j.logo,jobs:[]};map[j.client].jobs.push(j);if(j.logo&&!map[j.client].logo)map[j.client].logo=j.logo;});
  const clients=Object.values(map);
  if(!clients.length){body.innerHTML='<div class="empty"><span class="empty-icon">&#128101;</span>No clients yet.</div>';return;}
  body.innerHTML='<div style="padding:1rem;display:flex;flex-direction:column;gap:0">';
  clients.forEach(c=>{
    const card=document.createElement('div');card.className='client-card';card.onclick=()=>showClientDetail(c.name);
    card.appendChild(avatarEl({client:c.name,logo:c.logo}));
    const info=document.createElement('div');
    const active=c.jobs.filter(j=>!j.archived).length;
    const total=c.jobs.reduce((a,j)=>a+(Number(j.value)||0),0);
    info.innerHTML='<div class="client-card-name">'+c.name+'</div><div class="client-card-meta">'+c.jobs.length+' job'+(c.jobs.length!==1?'s':'')+' &middot; '+fmtMoney(total)+(active?' &middot; '+active+' active':'')+'</div>';
    card.appendChild(info);body.appendChild(card);
  });
}
function showClientDetail(name){
  const body=document.getElementById('cd-body');
  const jobs=state.jobs.filter(j=>j.client===name&&!j.deleted);body.innerHTML='';
  const info=jobs[0];
  if(info){
    const hd=document.createElement('div');hd.style.cssText='display:flex;align-items:center;gap:14px;padding:1rem;border-bottom:1px solid var(--border)';
    const av=avatarEl({client:name,logo:info.logo},52);const col=clientColor(name);if(!info.logo){av.style.background=col.bg;av.style.color=col.fg;}
    hd.appendChild(av);
    const total=jobs.reduce((a,j)=>a+(Number(j.value)||0),0);
    const paid=jobs.filter(j=>j.stage==='completed').reduce((a,j)=>a+(Number(j.value)||0),0);
    hd.innerHTML+='<div><div style="font-size:16px;font-weight:700;color:var(--text)">'+name+'</div><div style="font-size:12px;color:var(--text3);margin-top:3px">'+jobs.length+' jobs &middot; '+fmtMoney(total)+' total &middot; '+fmtMoney(paid)+' paid</div></div>';
    body.appendChild(hd);
    if(info.phone||info.email){const ct=document.createElement('div');ct.className='section';ct.innerHTML='<div class="section-title">Contact</div><div class="meta-grid">'+(info.phone?'<div class="meta-item"><div class="meta-label">Phone</div><div class="meta-value"><a href="tel:'+info.phone+'" style="color:var(--accent);text-decoration:none">'+info.phone+'</a></div></div>':'')+(info.email?'<div class="meta-item" style="grid-column:span 2"><div class="meta-label">Email</div><div class="meta-value"><a href="mailto:'+info.email+'" style="color:var(--accent);text-decoration:none;font-size:12px">'+info.email+'</a></div></div>':'')+'</div>';body.appendChild(ct);}
  }
  const js=document.createElement('div');js.className='section';js.innerHTML='<div class="section-title">All jobs</div>';
  const jl=document.createElement('div');jl.className='client-detail-jobs';
  jobs.forEach(j=>{const row=document.createElement('div');row.className='client-job-row';row.innerHTML='<div><div style="font-size:13px;font-weight:600;color:var(--text)">'+j.title+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+(j.jobNum||'')+' &middot; '+fmtDate(j.due)+'</div></div>'+stageBadge(j.stage);row.onclick=()=>showDetail(j.id);jl.appendChild(row);});
  js.appendChild(jl);body.appendChild(js);
  const ds=document.createElement('div');ds.className='section';ds.innerHTML='<button class="btn-danger" onclick="deleteClient(\''+name.replace(/'/g,"\\'")+'\')" >&#128465; Delete client</button>';body.appendChild(ds);
  showScreen('screen-client-detail');
}
function deleteClient(name){if(!confirm('Delete client "'+name+'"? Their jobs will be kept.'))return;goBack();}

// RECYCLE BIN
function softDeleteJob(id){if(!confirm('Move to Recycle Bin?'))return;const j=state.jobs.find(x=>x.id===id);if(!j)return;j.deleted=true;j.deletedAt=todayStr();save();showNav('dash');}
function showBin(){renderBin();showScreen('screen-bin');}
function renderBin(){
  const body=document.getElementById('bin-body');
  const now=new Date();
  state.jobs=state.jobs.filter(j=>{if(!j.deleted||!j.deletedAt)return true;const diff=Math.floor((now-new Date(j.deletedAt))/(864e5));return diff<14;});
  save();
  const binJobs=state.jobs.filter(j=>j.deleted);
  if(!binJobs.length){body.innerHTML='<div class="empty"><span class="empty-icon">&#128465;</span>Recycle bin is empty.</div>';return;}
  body.innerHTML='<div style="padding:.75rem 1rem 0;font-size:12px;color:var(--text3)">Jobs are permanently deleted after 14 days.</div>';
  binJobs.forEach(j=>{
    const diff=j.deletedAt?Math.floor((now-new Date(j.deletedAt))/(864e5)):0;const days=14-diff;
    const card=document.createElement('div');card.className='bin-card';
    card.innerHTML='<div class="bin-card-title">'+j.title+'</div><div class="bin-card-meta">'+j.client+' &middot; '+(j.jobNum||'')+'</div><div class="bin-countdown">'+days+' day'+(days!==1?'s':'')+' remaining</div><div class="bin-actions"><button class="bin-restore-btn" onclick="restoreJob('+j.id+')">&#8635; Restore</button><button class="bin-delete-btn" onclick="permDelete('+j.id+')">&#128465; Delete now</button></div>';
    body.appendChild(card);
  });
}
function restoreJob(id){const j=state.jobs.find(x=>x.id===id);if(!j)return;j.deleted=false;j.deletedAt=null;save();renderBin();}
function permDelete(id){if(!confirm('Permanently delete? Cannot be undone.'))return;state.jobs=state.jobs.filter(x=>x.id!==id);save();renderBin();}

// CALENDAR
function showCalendar(){renderCalendar();showScreen('screen-calendar');}
function renderCalendar(){
  const body=document.getElementById('cal-body');
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const monthName=firstDay.toLocaleDateString('en-NZ',{month:'long',year:'numeric'});
  const tStr=todayStr();
  const duemap={};state.jobs.filter(j=>!j.deleted&&j.due).forEach(j=>{if(!duemap[j.due])duemap[j.due]=[];duemap[j.due].push(j);});
  let h='<div class="cal-header"><button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">&#8592;</button><span class="cal-month">'+monthName+'</span><button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">&#8594;</button></div>';
  h+='<div class="cal-grid">'+['M','T','W','T','F','S','S'].map(d=>'<div class="cal-day-label">'+d+'</div>').join('');
  let start=firstDay.getDay()-1;if(start<0)start=6;
  for(let i=0;i<start;i++){const prev=new Date(calYear,calMonth,1-start+i);h+='<div class="cal-day other-month"><div class="cal-day-num">'+prev.getDate()+'</div></div>';}
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const jobs=duemap[ds]||[];
    h+='<div class="cal-day'+(ds===tStr?' today':'')+'" onclick="showCalDay(\''+ds+'\')"><div class="cal-day-num">'+d+'</div>';
    if(jobs.length)h+='<div class="cal-dots">'+jobs.slice(0,5).map(j=>'<div class="cal-dot" style="background:'+(STAGES[j.stage]||STAGES.survey).color+'"></div>').join('')+'</div>';
    h+='</div>';
  }
  h+='</div><div id="cal-day-jobs"></div>';
  body.innerHTML=h;
}
function showCalDay(dateStr){
  const jobs=state.jobs.filter(j=>!j.deleted&&j.due===dateStr);
  const el=document.getElementById('cal-day-jobs');if(!el)return;
  if(!jobs.length){el.innerHTML='<div style="text-align:center;padding:1rem;font-size:13px;color:var(--text3)">No jobs due '+fmtDate(dateStr)+'</div>';return;}
  el.innerHTML='<div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;padding:0 .25rem">'+fmtDate(dateStr)+'</div>';
  const ul=document.createElement('div');ul.className='cal-jobs-list';
  jobs.forEach(j=>{const row=document.createElement('div');row.className='cal-job-item';row.innerHTML='<div><div style="font-size:13px;font-weight:600;color:var(--text)">'+j.title+'</div><div style="font-size:11px;color:var(--text3)">'+j.client+'</div></div>'+stageBadge(j.stage);row.onclick=()=>showDetail(j.id);ul.appendChild(row);});
  el.appendChild(ul);
}

// SEARCH
function doSearch(q){
  const body=document.getElementById('search-results');
  if(!q.trim()){body.innerHTML='';return;}
  const ql=q.toLowerCase();
  const res=state.jobs.filter(j=>!j.deleted&&(j.title+j.client+(j.desc||'')+(j.jobNum||'')).toLowerCase().includes(ql));
  if(!res.length){body.innerHTML='<div class="empty">No results.</div>';return;}
  body.innerHTML='';renderJobList(body,res);
}

};

let fbDatabase = null;
let fbRef = null;
let fbOnline = false;
let saveDebounceTimer = null;

function initFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    fbDatabase = firebase.database();
    fbRef = fbDatabase.ref('pixelsigns');
    fbOnline = true;
    showSyncStatus('connecting');

    fbRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        state.jobs = data.jobs || [];
        state.bizName = data.bizName || 'Pixel Signs';
        state.nextId = Math.max(state.nextId || 1, data.nextId || 1);
        state.nextJobNum = Math.max(state.nextJobNum || 1, data.nextJobNum || 1);
        try { localStorage.setItem('ps_v3', JSON.stringify(state)); } catch(e) {}
        const active = document.querySelector('.screen.active');
        if (active) {
          if (active.id === 'screen-dash') renderDashboard();
          else if (active.id === 'screen-active') renderActiveJobs();
          else if (active.id === 'screen-completed') renderCompleted();
          else if (active.id === 'screen-clients') renderClients();
          else if (active.id === 'screen-calendar') renderCalendar();
          else if (active.id === 'screen-bin') renderBin();
        }
      }
      showSyncStatus('synced');
    });

    firebase.database().ref('.info/connected').on('value', (snap) => {
      showSyncStatus(snap.val() ? 'synced' : 'offline');
    });

  } catch(e) {
    console.warn('Firebase init failed:', e);
    fbOnline = false;
    showSyncStatus('offline');
  }
}

// Override save to write to Firebase
function save() {
  try { localStorage.setItem('ps_v3', JSON.stringify(state)); } catch(e) {}
  if (!fbOnline || !fbRef) return;
  showSyncStatus('saving');
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(() => {
    const jobsForCloud = state.jobs.map(j => {
      const copy = Object.assign({}, j);
      if (copy.photos && copy.photos.length > 5) copy.photos = copy.photos.slice(0, 5);
      return copy;
    });
    fbRef.set({
      jobs: jobsForCloud,
      bizName: state.bizName,
      nextId: state.nextId,
      nextJobNum: state.nextJobNum,
      lastUpdated: new Date().toISOString()
    }).then(() => showSyncStatus('synced'))
      .catch(err => { console.warn('Firebase save error:', err); showSyncStatus('error'); });
  }, 600);
}

function showSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const s = { connecting:{t:'⟳ Connecting...',c:'#999'}, saving:{t:'⟳ Saving...',c:'#f5a623'}, synced:{t:'✓ Synced',c:'#4caf7d'}, offline:{t:'⚡ Offline — changes saved locally',c:'#f5a623'}, error:{t:'✕ Sync error',c:'#e55'} };
  const st = s[status] || s.offline;
  el.textContent = st.t; el.style.color = st.c;
}
